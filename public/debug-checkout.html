<!DOCTYPE html>
<html>
<head>
    <title>Debug Checkout</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .debug { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 4px; }
        button { padding: 10px 20px; background: #007cba; color: white; border: none; border-radius: 4px; cursor: pointer; }
        input { padding: 8px; margin: 5px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Checkout Debug Test</h1>
    
    <div class="debug" id="debug-output">
        <h3>Debug Output:</h3>
        <div id="debug-log"></div>
    </div>
    
    <form id="test-form">
        <h3>Test Form:</h3>
        <input type="text" placeholder="Name" required>
        <input type="email" placeholder="Email" required>
        
        <div>
            <label>
                <input type="radio" name="payment_method" value="cod" checked> Cash on Delivery
            </label>
            <label>
                <input type="radio" name="payment_method" value="card"> Card Payment
            </label>
        </div>
        
        <div id="card-section" style="display: none; margin: 10px 0; padding: 10px; border: 1px solid #ccc;">
            <input type="text" id="card-number" placeholder="Card Number" maxlength="19">
            <input type="text" id="card-expiry" placeholder="MM/YY" maxlength="5">
            <input type="text" id="card-cvc" placeholder="CVC" maxlength="4">
        </div>
        
        <button type="submit" id="submit-btn">Place Order</button>
    </form>
    
    <div id="results" style="margin-top: 20px;"></div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        // Debug logging
        function debugLog(message, type = 'info') {
            console.log(message);
            const debugDiv = document.getElementById('debug-log');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'red' : type === 'success' ? 'green' : 'black';
            debugDiv.innerHTML += `<div style="color: ${color};">${timestamp}: ${message}</div>`;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            debugLog('✅ DOM loaded');
            
            // Check Stripe
            if (typeof Stripe === 'undefined') {
                debugLog('❌ Stripe not loaded', 'error');
                return;
            }
            debugLog('✅ Stripe loaded');
            
            const stripe = Stripe('pk_test_51S0gYfKyfRZGi0cj0Q2x7dEWuN4totRdghbjZQa8bzIA7mPjSeD6aAYgjbHOwahhhXhgKAFHT3tbukYLzCP8IwPq00kpxq5pIK');
            debugLog('✅ Stripe initialized');
            
            // Payment method toggle
            const cardSection = document.getElementById('card-section');
            document.querySelectorAll('input[name="payment_method"]').forEach(radio => {
                radio.addEventListener('change', function() {
                    debugLog('Payment method changed to: ' + this.value);
                    if (this.value === 'card') {
                        cardSection.style.display = 'block';
                    } else {
                        cardSection.style.display = 'none';
                    }
                });
            });
            
            // Form submission
            const form = document.getElementById('test-form');
            const submitBtn = document.getElementById('submit-btn');
            
            form.addEventListener('submit', async function(e) {
                debugLog('🚀 Form submitted');
                e.preventDefault();
                
                const paymentMethod = document.querySelector('input[name="payment_method"]:checked').value;
                debugLog('Selected payment method: ' + paymentMethod);
                
                if (paymentMethod === 'cod') {
                    debugLog('✅ COD order - would process normally');
                    document.getElementById('results').innerHTML = '<div style="color: green;">COD Order would be processed!</div>';
                    return;
                }
                
                // Card payment test
                debugLog('🔄 Processing card payment...');
                submitBtn.disabled = true;
                submitBtn.textContent = 'Processing...';
                
                try {
                    const cardNumber = document.getElementById('card-number').value.replace(/\s/g, '');
                    const cardExpiry = document.getElementById('card-expiry').value.split('/');
                    const cardCvc = document.getElementById('card-cvc').value;
                    
                    debugLog('Card data: ' + cardNumber.substring(0,4) + '****, ' + cardExpiry.join('/') + ', ' + cardCvc);
                    
                    if (!cardNumber || !cardExpiry[0] || !cardExpiry[1] || !cardCvc) {
                        throw new Error('Please fill all card fields');
                    }
                    
                    debugLog('📝 Creating Stripe payment method...');
                    const {error, paymentMethod: stripePaymentMethod} = await stripe.createPaymentMethod({
                        type: 'card',
                        card: {
                            number: cardNumber,
                            exp_month: parseInt(cardExpiry[0]),
                            exp_year: parseInt('20' + cardExpiry[1]),
                            cvc: cardCvc,
                        },
                    });
                    
                    if (error) {
                        debugLog('❌ Stripe error: ' + error.message, 'error');
                        document.getElementById('results').innerHTML = '<div style="color: red;">Stripe Error: ' + error.message + '</div>';
                    } else {
                        debugLog('✅ Payment method created: ' + stripePaymentMethod.id, 'success');
                        document.getElementById('results').innerHTML = '<div style="color: green;">SUCCESS! Payment method: ' + stripePaymentMethod.id + '</div>';
                    }
                    
                } catch (error) {
                    debugLog('❌ Processing error: ' + error.message, 'error');
                    document.getElementById('results').innerHTML = '<div style="color: red;">Error: ' + error.message + '</div>';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Place Order';
                }
            });
            
            debugLog('🎉 All event listeners attached');
        });
    </script>
</body>
</html>
