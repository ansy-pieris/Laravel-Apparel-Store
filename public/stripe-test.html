<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stripe Test</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .card-container { background: #f9f9f9; padding: 20px; border-radius: 8px; margin: 20px 0; }
        .error { color: red; margin-top: 10px; }
        .success { color: green; margin-top: 10px; }
        .payment-methods { margin: 20px 0; }
        .payment-methods label { display: block; margin: 10px 0; }
        #card-section { margin-top: 20px; }
        .hidden { display: none; }
        
        /* FORCE REMOVE ALL GRAY BARS AND BACKGROUNDS */
        #card-number-element, 
        #card-expiry-element, 
        #card-cvc-element {
            background: white !important;
            background-color: white !important;
        }
        
        #card-number-element *, 
        #card-expiry-element *, 
        #card-cvc-element *,
        .StripeElement,
        .StripeElement *,
        .StripeElement--focus,
        .StripeElement--focus * {
            background: transparent !important;
            background-color: transparent !important;
            background-image: none !important;
        }
    </style>
</head>
<body>
    <h1>Stripe Integration Test</h1>
    <div id="console-output"></div>
    
    <div class="payment-methods">
        <h3>Payment Method:</h3>
        <label>
            <input type="radio" name="payment_method" value="cod" checked> Cash on Delivery
        </label>
        <label>
            <input type="radio" name="payment_method" value="card"> Card Payment
        </label>
    </div>
    
    <div id="card-section" class="card-container hidden">
        <h3>Card Details</h3>
        <p>Use test card: 4242 4242 4242 4242</p>
        
        <!-- Ultra clean card fields - NO GRAY BARS -->
        <div style="margin-bottom: 15px;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">Card Number</label>
            <div id="card-number-element" style="background: #ffffff !important; padding: 10px; border: 2px solid #007cba; border-radius: 6px; height: 45px; overflow: hidden;"></div>
        </div>
        
        <div style="display: flex; gap: 15px; margin-bottom: 15px;">
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">Expiry</label>
                <div id="card-expiry-element" style="background: #ffffff !important; padding: 10px; border: 2px solid #007cba; border-radius: 6px; height: 45px; overflow: hidden;"></div>
            </div>
            <div style="flex: 1;">
                <label style="display: block; margin-bottom: 5px; font-weight: bold;">CVC</label>
                <div id="card-cvc-element" style="background: #ffffff !important; padding: 10px; border: 2px solid #007cba; border-radius: 6px; height: 45px; overflow: hidden;"></div>
            </div>
        </div>
        
        <div id="card-errors" class="error"></div>
    </div>
    
    <button id="test-btn" style="margin-top: 20px; padding: 10px 20px; background: #007cba; color: white; border: none; border-radius: 4px;">
        Test Payment
    </button>
    
    <div id="results"></div>

    <script src="https://js.stripe.com/v3/"></script>
    <script>
        // Console logging function
        function log(message, type = 'info') {
            console.log(message);
            const output = document.getElementById('console-output');
            const div = document.createElement('div');
            div.style.color = type === 'error' ? 'red' : type === 'success' ? 'green' : 'black';
            div.textContent = new Date().toLocaleTimeString() + ': ' + message;
            output.appendChild(div);
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            log('🚀 DOM loaded, starting Stripe test...');
            
            // Check if Stripe is loaded
            if (typeof Stripe === 'undefined') {
                log('❌ Stripe is not loaded! Check CSP settings.', 'error');
                document.getElementById('card-errors').textContent = 'Stripe not loaded - CSP issue';
                return;
            }
            
            log('✅ Stripe is available');
            
            try {
                // Initialize Stripe with test key
                const stripe = Stripe('pk_test_51S0gYfKyfRZGi0cj0Q2x7dEWuN4totRdghbjZQa8bzIA7mPjSeD6aAYgjbHOwahhhXhgKAFHT3tbukYLzCP8IwPq00kpxq5pIK');
                const elements = stripe.elements();
                log('✅ Stripe elements created');
                
                // Create CLEAN card elements - NO GRAY BARS
                const cardNumberElement = elements.create('cardNumber', {
                    style: {
                        base: {
                            fontSize: '18px',
                            color: '#000000',
                            fontFamily: 'system-ui, -apple-system, sans-serif',
                            fontWeight: '400',
                            lineHeight: '24px',
                            backgroundColor: 'transparent',
                            '::placeholder': { 
                                color: '#666666',
                                fontSize: '18px'
                            }
                        },
                        invalid: {
                            color: '#dc3545',
                            backgroundColor: 'transparent'
                        },
                        complete: {
                            color: '#000000',
                            backgroundColor: 'transparent'
                        }
                    }
                });
                
                const cardExpiryElement = elements.create('cardExpiry', {
                    style: {
                        base: {
                            fontSize: '18px',
                            color: '#000000',
                            fontFamily: 'system-ui, -apple-system, sans-serif',
                            fontWeight: '400',
                            lineHeight: '24px',
                            backgroundColor: 'transparent',
                            '::placeholder': { 
                                color: '#666666',
                                fontSize: '18px'
                            }
                        },
                        invalid: {
                            color: '#dc3545',
                            backgroundColor: 'transparent'
                        },
                        complete: {
                            color: '#000000',
                            backgroundColor: 'transparent'
                        }
                    }
                });
                
                const cardCvcElement = elements.create('cardCvc', {
                    style: {
                        base: {
                            fontSize: '18px',
                            color: '#000000',
                            fontFamily: 'system-ui, -apple-system, sans-serif',
                            fontWeight: '400',
                            lineHeight: '24px',
                            backgroundColor: 'transparent',
                            '::placeholder': { 
                                color: '#666666',
                                fontSize: '18px'
                            }
                        },
                        invalid: {
                            color: '#dc3545',
                            backgroundColor: 'transparent'
                        },
                        complete: {
                            color: '#000000',
                            backgroundColor: 'transparent'
                        }
                    }
                });
                
                log('✅ Separate card elements created');
                
                let cardMounted = false;
                const cardSection = document.getElementById('card-section');
                
                // Payment method toggle
                function toggleCardSection() {
                    const paymentMethod = document.querySelector('input[name="payment_method"]:checked')?.value;
                    log('Payment method selected: ' + paymentMethod);
                    
                    if (paymentMethod === 'card') {
                        cardSection.classList.remove('hidden');
                        log('✅ Card section shown');
                        
                        if (!cardMounted) {
                            try {
                                cardNumberElement.mount('#card-number-element');
                                cardExpiryElement.mount('#card-expiry-element');
                                cardCvcElement.mount('#card-cvc-element');
                                cardMounted = true;
                                log('✅ Separate card elements mounted successfully', 'success');
                                
                                // Focus the card number field
                                setTimeout(() => {
                                    cardNumberElement.focus();
                                    log('🎯 Focused card number element');
                                }, 300);
                            } catch (error) {
                                log('❌ Error mounting card elements: ' + error.message, 'error');
                            }
                        }
                    } else {
                        cardSection.classList.add('hidden');
                        log('Card section hidden');
                    }
                }
                
                // Listen to radio button changes
                document.querySelectorAll('input[name="payment_method"]').forEach(radio => {
                    radio.addEventListener('change', toggleCardSection);
                });
                
                // Card events
                cardNumberElement.on('ready', function() {
                    log('🎉 Card number element is ready for input!', 'success');
                });
                
                cardExpiryElement.on('ready', function() {
                    log('🎉 Card expiry element is ready!', 'success');
                });
                
                cardCvcElement.on('ready', function() {
                    log('🎉 Card CVC element is ready!', 'success');
                });
                
                // Handle validation errors
                function handleCardError(event) {
                    if (event.error) {
                        document.getElementById('card-errors').textContent = event.error.message;
                        log('Card validation error: ' + event.error.message, 'error');
                    } else {
                        document.getElementById('card-errors').textContent = '';
                    }
                }
                
                cardNumberElement.on('change', handleCardError);
                cardExpiryElement.on('change', handleCardError);
                cardCvcElement.on('change', handleCardError);
                
                // Test button
                document.getElementById('test-btn').addEventListener('click', async function() {
                    const paymentMethod = document.querySelector('input[name="payment_method"]:checked')?.value;
                    
                    if (paymentMethod !== 'card') {
                        log('COD selected - no card processing needed');
                        return;
                    }
                    
                    if (!cardMounted) {
                        log('❌ Card not mounted yet', 'error');
                        return;
                    }
                    
                    log('Testing payment method creation...');
                    
                    try {
                        const {error, paymentMethod: stripePaymentMethod} = await stripe.createPaymentMethod({
                            type: 'card',
                            card: cardNumberElement,
                        });
                        
                        if (error) {
                            log('❌ Payment method error: ' + error.message, 'error');
                        } else {
                            log('✅ Payment method created: ' + stripePaymentMethod.id, 'success');
                            document.getElementById('results').innerHTML = '<div style="color: green;">Success! Payment method: ' + stripePaymentMethod.id + '</div>';
                        }
                    } catch (err) {
                        log('❌ Exception: ' + err.message, 'error');
                    }
                });
                
                log('🎉 Setup complete!');
                
            } catch (error) {
                log('❌ Setup error: ' + error.message, 'error');
            }
        });
    </script>
</body>
</html>
